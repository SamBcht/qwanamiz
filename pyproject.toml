[project]
name = "qwanamiz"
version = "0.1.0"
description = "Quantitative Wood Anatomy Measurements"
authors = [{name = "Samuel Bouchut"}]
license = "GNU General Public License v3.0"
readme = "README.md"
requires-python=">=3.12"
dependencies = ["numpy (>=2.3.4,<3.0.0)", "scikit-image (>=0.25.2,<0.26.0)", "pandas (>=2.3.3,<3.0.0)", "matplotlib (>=3.10.7,<4.0.0)", "napari[all] (>=0.6.6,<0.7.0)"]

[poetry.group.dev.dependencies]

[project.scripts]
qwanaflow  = "qwanamiz.qwanaflow:main"
qwanarings = "qwanamiz.qwanarings:main"
qwanaviz   = "qwanamiz.qwanaviz:main"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.group.dev.dependencies]
jupyter = "^1.1.1"
myst-nb = "^1.3.0"
sphinx-autoapi = "^3.6.1"
sphinx-rtd-theme = "^3.0.2"

